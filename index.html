
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Central - Wybór Języka</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-header { font-family: 'Bebas Neue', cursive; letter-spacing: 0.05em; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.6s ease-in-out;
        }
        
        @keyframes pulse-scale {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .hover-pulse:hover {
            animation: pulse-scale 0.6s ease-in-out;
        }
        
        .flag {
            font-size: 60px;
            line-height: 1;
            display: block;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full animate-fade-in">
        
        <!-- HEADER -->
        <div class="text-center mb-12">
            <h1 class="text-7xl font-header tracking-widest mb-4 text-white">LA CENTRAL</h1>
            <p class="text-gray-400 text-lg tracking-wider">Los mejores tacos y bowls</p>
            <p class="text-gray-500 text-sm mt-2">Elige tu idioma / Choose your language</p>
        </div>

        <!-- GRID DE IDIOMAS -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            
            <!-- ESPAÑOL -->
            <a href="menu.html?lang=es" class="hover-pulse group bg-gradient-to-br from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 p-6 rounded-2xl text-center transition transform text-white shadow-lg">
                <span class="flag group-hover:scale-110 transition inline-block">🇪🇸</span>
                <div class="font-black text-xl mt-3">ESPAÑOL</div>
                <div class="text-xs text-red-100 mt-2">ES</div>
            </a>

            <!-- ENGLISH -->
            <a href="menu.html?lang=en" class="hover-pulse group bg-gradient-to-br from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 p-6 rounded-2xl text-center transition transform text-white shadow-lg">
                <span class="flag group-hover:scale-110 transition inline-block">🇬🇧</span>
                <div class="font-black text-xl mt-3">ENGLISH</div>
                <div class="text-xs text-blue-100 mt-2">EN</div>
            </a>

            <!-- POLSKI -->
            <a href="menu.html?lang=pl" class="hover-pulse group bg-gradient-to-br from-white to-gray-200 hover:from-gray-100 hover:to-gray-300 p-6 rounded-2xl text-center transition transform shadow-lg">
                <span class="flag group-hover:scale-110 transition inline-block">🇵🇱</span>
                <div class="font-black text-xl text-gray-900 mt-3">POLSKI</div>
                <div class="text-xs text-gray-600 mt-2">PL</div>
            </a>

            <!-- DEUTSCH -->
            <a href="menu.html?lang=de" class="hover-pulse group bg-gradient-to-br from-yellow-500 to-amber-600 hover:from-yellow-600 hover:to-amber-700 p-6 rounded-2xl text-center transition transform text-white shadow-lg">
                <span class="flag group-hover:scale-110 transition inline-block">🇩🇪</span>
                <div class="font-black text-xl mt-3">DEUTSCH</div>
                <div class="text-xs text-yellow-100 mt-2">DE</div>
            </a>

            <!-- FRANÇAIS -->
            <a href="menu.html?lang=fr" class="hover-pulse group bg-gradient-to-br from-purple-500 to-indigo-600 hover:from-purple-600 hover:to-indigo-700 p-6 rounded-2xl text-center transition transform text-white shadow-lg col-span-2">
                <span class="flag group-hover:scale-110 transition inline-block">🇫🇷</span>
                <div class="font-black text-xl mt-3">FRANÇAIS</div>
                <div class="text-xs text-purple-100 mt-2">FR</div>
            </a>

        </div>

        <!-- FOOTER -->
        <div class="text-center text-gray-500 text-xs">
            <p class="mb-2">📍 Lajares, Fuerteventura</p>
            <p class="font-bold text-green-400">🕐 10:00 - 16:00</p>
            <p class="text-gray-600 text-xs mt-2">Lunes-Domingo / Mon-Sun</p>
            <p class="mt-4 text-gray-600">© 2024 La Central</p>
        </div>

    </div>

    <script>
        // Animación al hacer click
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                const ripple = document.createElement('div');
                ripple.style.position = 'absolute';
                ripple.style.width = '20px';
                ripple.style.height = '20px';
                ripple.style.background = 'rgba(255,255,255,0.5)';
                ripple.style.borderRadius = '50%';
                ripple.style.pointerEvents = 'none';
                ripple.style.animation = 'expand 0.6s ease-out';
                
                this.style.position = 'relative';
                this.style.overflow = 'hidden';
                this.appendChild(ripple);
                
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>

    <style>
        @keyframes expand {
            to {
                width: 300px;
                height: 300px;
                opacity: 0;
            }
        }
    </style>

</body>
</html>
